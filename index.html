<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Todo App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="header">
    <h1>📝 Smart Todo</h1>
    <div class="stats">
      <span id="totalTasks">0 Tasks</span>
      <span id="completedTasks">0 Completed</span>
      <span id="activeTasks">0 Active</span>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="add-list">
        <input type="text" id="newListInput" placeholder="New list name">
        <button onclick="addList()">+</button>
      </div>
      <div class="lists" id="lists"></div>
    </div>

    <div class="content">
      <div class="add-task">
        <input type="text" id="taskInput" placeholder="Add a new task..." onkeypress="if(event.key==='Enter') addTask()">
        <input type="date" id="taskDate">
        <input type="time" id="taskTime">
        <button onclick="addTask()">Add Task</button>
      </div>
      <div class="tasks" id="tasks"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
